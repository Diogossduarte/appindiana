          />
        </div>

        {/* Rodapé da sidebar */}
        <div style={{ padding:"12px 14px 16px", borderTop:"1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ fontSize:10, color:"rgba(255,255,255,0.2)", lineHeight:1.6 }}>
            Dúvidas e sugestões:
          </div>
          <a href="mailto:diogossduarte@icloud.com"
            style={{ fontSize:10, color:"#4DAAFF", textDecoration:"none",
              wordBreak:"break-all", lineHeight:1.5, display:"block",
              marginTop:2 }}>
            diogossduarte@icloud.com
          </a>
        </div>

      </aside>

      {/* ── Conteúdo ── */}
      <div style={{ marginLeft:220, flex:1, display:"flex", flexDirection:"column",
        minWidth:0 }}>

        {/* Topbar */}
        <header style={{ background:T.surface, borderBottom:`1px solid ${T.borderL}`,
          padding:"0 28px", height:56, display:"flex", alignItems:"center",
          justifyContent:"space-between", position:"sticky", top:0, zIndex:100,
          boxShadow:"0 1px 0 rgba(10,15,30,0.06)" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", flex:1, minWidth:0 }}>
            <span style={{ fontSize:15, fontWeight:700, color:T.text, flexShrink:0 }}>
              {aba==="produto" ? "Por produto" : aba==="filial" ? "Por filial" : "Maps"}
            </span>
            <span style={{ fontSize:12, color:T.sub, flexShrink:0 }}>
              {aba==="produto"
                ? `${porProduto.length} produto${porProduto.length!==1?"s":""}`
                : aba==="filial"
                ? `${porFilial.length} filial${porFilial.length!==1?"is":""}`
                : "cobertura geográfica"}
            </span>
            {/* Chip da linha ativa */}
            {linhaAtiva && (
              <span onClick={()=>setLinhaSelecaoAberta(true)}
                style={{ display:"inline-flex", alignItems:"center", gap:4,
                  fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:20,
                  background:"#EAF2FF", color:"#1B7FE8", flexShrink:0, cursor:"pointer" }}>
                Linha: {linhaAtiva}
                <button onClick={e=>{e.stopPropagation();setLinhaAtiva(null);}}
                  style={{ background:"none", border:"none", cursor:"pointer",
                    color:"#1B7FE8", fontSize:13, lineHeight:1, padding:0 }}>×</button>
              </span>
            )}
            {/* Chips de filtros ativos */}
            {cidadeF.map(c=>(
              <span key={c} style={{ display:"inline-flex", alignItems:"center", gap:4,
                fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:20,
                background:"#F0FDF9", color:"#065F46", flexShrink:0 }}>
                {c}
                <button onClick={()=>setCidadeF(prev=>prev.filter(x=>x!==c))}
                  style={{ background:"none", border:"none", cursor:"pointer",
                    color:"#059669", fontSize:13, lineHeight:1, padding:0 }}>×</button>
              </span>
            ))}
            {filialF.map(f=>(
              <span key={f} style={{ display:"inline-flex", alignItems:"center", gap:4,
                fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:20,
                background:"#EEF2FF", color:"#4338CA", flexShrink:0 }}>
                {f}
                <button onClick={()=>setFilialF(prev=>prev.filter(x=>x!==f))}
                  style={{ background:"none", border:"none", cursor:"pointer",
                    color:"#6366F1", fontSize:13, lineHeight:1, padding:0 }}>×</button>
              </span>
            ))}
            {sitF.map(s=>{
              const cor = { Falta:"#EF4444", Regular:"#10B981", Excesso:"#EAB308" }[s]||T.sub;
              return (
                <span key={s} style={{ display:"inline-flex", alignItems:"center", gap:4,
                  fontSize:11, fontWeight:600, padding:"2px 8px", borderRadius:20,
                  background:`${cor}18`, color:cor, flexShrink:0 }}>
                  {s}
                  <button onClick={()=>setSitF(prev=>prev.filter(x=>x!==s))}
                    style={{ background:"none", border:"none", cursor:"pointer",
                      color:cor, fontSize:13, lineHeight:1, padding:0 }}>×</button>
                </span>
              );
            })}
          </div>
          <ProductSelect allProducts={allProducts} selected={prodSel} onChange={setProdSel}/>
        </header>

        <div style={{ padding:"24px 28px", flex:1 }}>
          {/* KPIs */}
          <div style={{ display:"flex", gap:14, marginBottom:24, flexWrap:"wrap" }}>
            <KpiCard label="Produtos" value={metrics.prods} accent={metrics.naoEncontrados.length>0 ? T.coral : T.mint} icon="◈"
              sub={metrics.naoEncontrados.length>0
                ? `${metrics.naoEncontrados.length} da grade não encontrado${metrics.naoEncontrados.length!==1?"s":""}`
                : linhaAtiva ? `linha ${linhaAtiva}` : "meus produtos"}/>
            <KpiCard label="Total de lojas" value={filiais.length} accent="#1B7FE8" icon="⌂"
              sub="filiais ativas"/>
            <KpiCard label="Estoque total" value={metrics.estoque} accent="#6366F1" icon="◫"
              sub="todas as filiais"/>
            <KpiCard label={colLabels.vendasJun} value={metrics.vendasJun} accent={T.amber} icon="◆"
              sub="unidades vendidas"/>
            <KpiCard label="Produtos em falta" value={metrics.faltas} accent={T.coral} icon="◉"
              sub={metrics.faltas>0 ? "requer atenção" : "sem ocorrências"}/>
          </div>

          {/* Aviso de códigos da grade não encontrados na planilha atual */}
          {metrics.naoEncontrados.length > 0 && (
            <div style={{ background:"#FEF2F2", border:"1px solid #FECACA", borderRadius:12,
              padding:"12px 16px", marginBottom:20, display:"flex", alignItems:"flex-start", gap:10 }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#DC2626"
                strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0, marginTop:1 }}>
                <path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              </svg>
              <div>
                <div style={{ fontSize:13, fontWeight:700, color:"#991B1B" }}>
                  {metrics.naoEncontrados.length} código{metrics.naoEncontrados.length!==1?"s":""} da grade não {metrics.naoEncontrados.length!==1?"foram":"foi"} encontrado{metrics.naoEncontrados.length!==1?"s":""} nesta planilha
                </div>
                <div style={{ fontSize:12, color:"#B91C1C", marginTop:3 }}>
                  {metrics.naoEncontrados.join(", ")}
                </div>
              </div>
            </div>
          )}

          {/* ── Aba: Por produto ── */}
          {aba==="produto" && (
            <div style={{ background:T.surface, borderRadius:16,
              border:`1px solid ${T.borderL}`, overflow:"hidden",
              boxShadow:"0 2px 12px rgba(10,15,30,0.06)" }}>
              <div style={{ padding:"12px 18px", borderBottom:`1px solid ${T.borderL}`,
                display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <span style={{ fontSize:12, fontWeight:600, color:T.sub,
                  textTransform:"uppercase", letterSpacing:0.6 }}>
                  {porProduto.length} produto{porProduto.length!==1?"s":""}
                </span>
                <span style={{ fontSize:11, color:T.hint }}>
                  Clique no código ou produto para ver o gráfico
                </span>
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                  <thead>
                    <tr style={{ background:"#F8FAFF" }}>
                      {COLS.map(({ label, col }) => {
                        const active = sortCol===col;
                        return (
                          <th key={col} onClick={()=>handleSort(col)}
                            style={{ padding:"10px 14px", textAlign:"left", fontWeight:700,
                              fontSize:10, letterSpacing:0.8, textTransform:"uppercase",
                              color:active?T.petrol:T.hint,
                              borderBottom:`1px solid ${T.borderL}`, whiteSpace:"nowrap",
                              cursor:"pointer", userSelect:"none",
                              background:active?"#EEF2FF":"#F8FAFF",
                              transition:"background 0.1s, color 0.1s" }}>
                            <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
                              {label}
                              <span style={{ fontSize:9, opacity:active?1:0.3 }}>
                                {active?(sortDir==="asc"?"▲":"▼"):"⇅"}
                              </span>
                            </span>
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {porProduto.map((r,i) => {
                      const open = prodAberto===r.produto;
                      const openRanking = codAberto===r.produto;
                      const spark = [r.vendasJun, r.vendasMai, r.vendasJun25];
                      const trendUp = r.vendasJun25 >= r.vendasJun;
                      return (
                        <>
                          <tr key={`r${i}`}
                            style={{ borderBottom:(open||openRanking)?"none":`1px solid ${T.borderL}`,
                              background:(open||openRanking)?"#EEF2FF":"transparent",
                              transition:"background 0.15s" }}
                            onMouseEnter={e=>{ if(!open&&!openRanking) e.currentTarget.style.background="#F8FAFF"; }}
                            onMouseLeave={e=>{ e.currentTarget.style.background=(open||openRanking)?"#EEF2FF":"transparent"; }}>

                            {/* Código */}
                            <td onClick={()=>setCodAberto(p=>p===r.produto?null:r.produto)}
                              style={{ padding:"10px 14px", color:"#6366F1", fontSize:13,
                                whiteSpace:"nowrap", cursor:"pointer", fontWeight:700,
                                textDecoration:"underline" }}>
                              {r.codProduto}
                            </td>
                            {/* Produto */}
                            <td onClick={()=>setProdAberto(p=>p===r.produto?null:r.produto)}
                              style={{ padding:"10px 14px", fontWeight:700, maxWidth:220,
                                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                                cursor:"pointer", color:"#4338CA",
                                textDecoration:"underline" }} title={r.produto}>
                              {r.produto}
                            </td>

                            <td style={{ padding:"10px 14px", color:T.hint, fontSize:11,
                              whiteSpace:"nowrap" }}>{r.linha}</td>
                            <td style={{ padding:"10px 14px", whiteSpace:"nowrap", fontWeight:600 }}>
                              {r.preco.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</td>
                            <td style={{ padding:"10px 14px", textAlign:"center", fontWeight:800,
                              fontSize:15, color:r.estoque===0?T.coral:T.text }}>
                              {r.estoque}
                            </td>
                            <td style={{ padding:"10px 14px" }}><Badge sit={r.situacaoConsolidada}/></td>
                            <td style={{ padding:"10px 14px", textAlign:"center",
                              color:T.sub, fontSize:12 }}>{r.vendasJun}</td>
                            <td style={{ padding:"10px 14px", textAlign:"center",
                              color:T.sub, fontSize:12 }}>{r.vendasMai}</td>
                            {/* Jun/2025 com destaque */}
                            <td style={{ padding:"10px 14px", textAlign:"center" }}>
                              <span style={{ fontWeight:800, fontSize:14,
                                color:trendUp?T.mint:T.coral }}>{r.vendasJun25}</span>
                            </td>
                            {/* Sparkline + média */}
                            <td style={{ padding:"10px 14px", textAlign:"center" }}>
                              <div style={{ display:"flex", alignItems:"center", gap:8, justifyContent:"center" }}>
                                <Spark values={spark} color={trendUp?T.mint:T.coral}/>
                                <span style={{ fontSize:11, color:T.sub }}>{Math.round(r.mediaTrim)}</span>
                              </div>
                            </td>
                          </tr>

                          {open && (
                            <GraficoProduto key={`g${i}`}
                              produto={r.produto}
                              jun24={r.vendasJun} mai25={r.vendasMai} jun25={r.vendasJun25}
                              colLabels={colLabels}
                              onClose={()=>setProdAberto(null)}/>
                          )}
                          {openRanking && (
                            <RankingLojasProduto key={`rk${i}`}
                              produto={r.produto} codProduto={r.codProduto}
                              rows={rows} meusCodigos={meusCodigos} meus={meus}
                              colLabels={colLabels}
                              onClose={()=>setCodAberto(null)}/>
                          )}
                        </>
                      );
                    })}
                    {porProduto.length===0 && (
                      <tr><td colSpan={10} style={{ padding:"60px", textAlign:"center", color:T.hint }}>
                        <div style={{ fontSize:32, marginBottom:8 }}>◈</div>
                        Nenhum produto encontrado com os filtros selecionados.
                      </td></tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── Aba: Por filial ── */}
          {aba==="filial" && (
            <div>
              {/* Barra de ação */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                marginBottom:16 }}>
                <span style={{ fontSize:12, fontWeight:600, color:T.sub,
                  textTransform:"uppercase", letterSpacing:0.6 }}>
                  {porFilial.length} filial{porFilial.length!==1?"is":""}
                  {filialF.length>0 && ` · ${filialF.length} selecionada${filialF.length!==1?"s":""}`}
                </span>

                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {/* Botões expandir/recolher todas as lojas */}
                  <div style={{ display:"flex", alignItems:"center",
                    border:`1px solid ${T.borderL}`, borderRadius:9, overflow:"hidden" }}>
                    <button onClick={() => { setExpandirSinal(true); setExpandirContador(c=>c+1); }}
                      title="Expandir produtos de todas as lojas"
                      style={{ width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center",
                        border:"none", borderRight:`1px solid ${T.borderL}`, cursor:"pointer",
                        background:T.surface, color:T.sub, fontSize:16, fontWeight:700,
                        transition:"background 0.15s" }}
                      onMouseEnter={e=>{ e.currentTarget.style.background="#EEF6FF"; e.currentTarget.style.color="#1B7FE8"; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background=T.surface; e.currentTarget.style.color=T.sub; }}>
                      +
                    </button>
                    <button onClick={() => { setExpandirSinal(false); setExpandirContador(c=>c+1); }}
                      title="Recolher produtos de todas as lojas"
                      style={{ width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center",
                        border:"none", cursor:"pointer",
                        background:T.surface, color:T.sub, fontSize:16, fontWeight:700,
                        transition:"background 0.15s" }}
                      onMouseEnter={e=>{ e.currentTarget.style.background="#FEF2F2"; e.currentTarget.style.color="#DC2626"; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background=T.surface; e.currentTarget.style.color=T.sub; }}>
                      −
                    </button>
                  </div>

                  <button onClick={() => {
                  const cabecalho = [
                    "Cod. Filial","Filial","Endereço","Número","Bairro","CEP","Cidade","UF",
                    "Cod. Produto","Produto","Linha","Preço","Estoque",
                    "Situação Estoque",
                    colLabels.vendasJun, colLabels.vendasMai, colLabels.vendasJun25,
                    "Venda média Trim. fechado",
                    "% "+colLabels.vendasMai, "% "+colLabels.vendasJun25,
                    "% Venda média Trim. fechado",
                  ];

                  const linhas = [];
                  // Exporta exatamente o que está visível em tela:
                  // porFilial já respeita filtros de cidade e filial
                  // aplicamos também prodSel e sitF (igual ao FilialBlock)
                  porFilial.forEach(([nomeFil, itensFil]) => {
                    let itensFiltrados = itensFil.filter(r => meusCodigos.has(Number(r.codProduto)));
                    if (prodSel.length > 0)
                      itensFiltrados = itensFiltrados.filter(r => prodSel.includes(r.produto));
                    if (sitF.length > 0)
                      itensFiltrados = itensFiltrados.filter(r => sitF.includes(r.situacao));
                    if (itensFiltrados.length === 0) return;

                    itensFiltrados.forEach(r => {
                      linhas.push([
                        r.codFilial, r.filial, r.endereco, r.numero, r.bairro,
                        r.cep, r.cidade, r.uf, r.codProduto, r.produto,
                        r.linha, r.preco, r.estoque, r.situacao,
                        r.vendasJun, r.vendasMai, r.vendasJun25, r.mediaTrim,
                        r.pctMai, r.pctJun25, r.pctTrim,
                      ]);
                    });
                  });

                  if (linhas.length === 0) return;

                  const ws = XLSX.utils.aoa_to_sheet([cabecalho, ...linhas]);
                  ws["!cols"] = [
                    {wch:10},{wch:26},{wch:22},{wch:8},{wch:14},{wch:12},{wch:20},{wch:4},
                    {wch:12},{wch:36},{wch:20},{wch:10},{wch:10},
                    {wch:16},{wch:12},{wch:12},{wch:14},{wch:18},{wch:14},{wch:16},{wch:24},
                  ];

                  const wb = XLSX.utils.book_new();
                  XLSX.utils.book_append_sheet(wb, ws, "Por Filial");

                  const hoje = new Date().toISOString().slice(0,10);
                  XLSX.writeFile(wb, `reposicao_filial_${hoje}.xlsx`);
                }}
                  style={{ display:"flex", alignItems:"center", gap:7,
                    padding:"7px 14px", borderRadius:9, border:"none", cursor:"pointer",
                    background:T.mint, color:T.navy, fontSize:12, fontWeight:700,
                    boxShadow:"0 2px 8px rgba(0,201,167,0.3)", transition:"all 0.15s" }}
                  onMouseEnter={e=>{ e.currentTarget.style.background="#00b896"; e.currentTarget.style.boxShadow="0 4px 14px rgba(0,201,167,0.45)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background=T.mint; e.currentTarget.style.boxShadow="0 2px 8px rgba(0,201,167,0.3)"; }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Exportar Excel
                </button>
                </div>
              </div>
              {porFilial
                .map(([nome,itens])=>(
                  <FilialBlock key={nome} filial={nome} itens={itens}
                    situacaoFiltro={sitF} produtosSelecionados={prodSel}
                    onSituacaoChange={setSitF} colLabels={colLabels}
                    isTop10={top10FiliaisSet.has(nome)}
                    expandirSinal={expandirSinal} expandirContador={expandirContador}/>
                ))
              }
              {porFilial.length===0 && (
                <div style={{ padding:"60px", textAlign:"center", color:T.hint,
                  background:T.surface, borderRadius:16, border:`1px solid ${T.borderL}` }}>
                  Nenhuma filial encontrada.
                </div>
              )}
            </div>
          )}

          {/* ── Aba: Maps ── */}
          {aba==="maps" && (
            <MapsTab rows={rows} meusCodigos={meusCodigos} meus={meus}/>
          )}
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
