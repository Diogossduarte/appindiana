function loadLinhasMap() {
  // Mescla o mapeamento fixo com eventuais ajustes manuais salvos localmente
  let overrides = {};
  try { overrides = JSON.parse(localStorage.getItem("linhas_map") || "{}"); }
  catch { overrides = {}; }
  return { ...LINHAS_FIXAS, ...overrides };
}
function saveLinhasMap(map) {
  // Salva apenas as diferenças em relação ao mapeamento fixo (overrides)
  const overrides = {};
  Object.entries(map).forEach(([cod, linha]) => {
    if (LINHAS_FIXAS[cod] !== linha) overrides[cod] = linha;
  });
  try { localStorage.setItem("linhas_map", JSON.stringify(overrides)); } catch {}
}

    if (raw) return new Set(JSON.parse(raw).map(Number));
  } catch {}
  return new Set(DEFAULT_CODIGOS);
}

// ─── Modal de configuração de produtos ───────────────────────────────────────
function SettingsModal({ allRows, meusCodigos, onSave, onClose, alertaCodigos, onSaveAlerta, linhaAtiva }) {
  const [aba, setAba] = useState("grade"); // "grade" | "alerta"
  const [busca, setBusca] = useState("");
  const [selecionados, setSelecionados] = useState(() => new Set(meusCodigos));
  const [alertaLocal, setAlertaLocal] = useState(() => new Set(alertaCodigos || []));
  const [buscaAlerta, setBuscaAlerta] = useState("");
  const [linhasMap, setLinhasMap] = useState(() => loadLinhasMap());
  const [linhaFiltro, setLinhaFiltro] = useState(null); // null | "Sem linha" | nome da linha
  const [modoAtribuir, setModoAtribuir] = useState(null);

  // Produtos únicos da planilha: { cod, nome }
  const todosProdutos = useMemo(() => {
    const map = new Map();
    allRows.forEach(r => {
      const cod = Number(r.codProduto);
      if (cod && !map.has(cod)) map.set(cod, r.produto);
    });
    return [...map.entries()]
      .map(([cod, nome]) => ({ cod, nome }))
      .sort((a,b) => a.nome.localeCompare(b.nome));
  }, [allRows]);

  // Contagem de produtos por linha (e sem linha)
  const contagemPorLinha = useMemo(() => {
    const c = {};
    LINHAS_PRODUTO.forEach(l => c[l] = []);
    c["Sem linha"] = [];
    todosProdutos.forEach(p => {
      const l = linhasMap[p.cod];
      if (l && c[l]) c[l].push(p.cod);
      else c["Sem linha"].push(p.cod);
    });
    return c;
  }, [todosProdutos, linhasMap]);

  const filtrados = useMemo(() => {
    let lista = todosProdutos;
    if (linhaFiltro === "Sem linha") lista = lista.filter(p => !linhasMap[p.cod]);
    else if (linhaFiltro) lista = lista.filter(p => linhasMap[p.cod] === linhaFiltro);
    if (busca.trim()) {
      const q = busca.toUpperCase();
      lista = lista.filter(p => p.nome.toUpperCase().includes(q) || String(p.cod).includes(q));
    }
    return lista;
  }, [todosProdutos, busca, linhaFiltro, linhasMap]);

  function toggle(cod) {
    if (modoAtribuir) {
      setLinhasMap(prev => {
        const next = { ...prev };
        next[cod] === modoAtribuir ? delete next[cod] : next[cod] = modoAtribuir;
        saveLinhasMap(next);
        return next;
      });
      return;
    }
    setSelecionados(prev => {
      const next = new Set(prev);
      next.has(cod) ? next.delete(cod) : next.add(cod);
      return next;
    });
  }

  // Filtra a visualização por linha — NÃO altera a grade
  function filtrarPorLinha(linha) {
    setLinhaFiltro(f => f === linha ? null : linha);
  }

  // Alterna (toggle) todos os produtos de UMA linha na grade
  function toggleLinhaNaGrade(linha) {
    const codigos = contagemPorLinha[linha] || [];
    if (codigos.length === 0) return;
    const todosMarcados = codigos.every(c => selecionados.has(c));
    setSelecionados(prev => {
      const next = new Set(prev);
      codigos.forEach(c => todosMarcados ? next.delete(c) : next.add(c));
      return next;
    });
  }

  // Alterna (toggle) todos os produtos com QUALQUER linha associada
  function marcarTodasLinhas() {
    const todosComLinha = todosProdutos
      .filter(p => linhasMap[p.cod])
      .map(p => p.cod);
    const todosJaMarcados = todosComLinha.length > 0 &&
      todosComLinha.every(cod => selecionados.has(cod));
    setSelecionados(prev => {
      const next = new Set(prev);
      todosComLinha.forEach(cod => {
        todosJaMarcados ? next.delete(cod) : next.add(cod);
      });
      return next;
    });
  }

  function toggleAll() {
    const todosVisiveis = filtrados.map(p => p.cod);
    const todosSelecionados = todosVisiveis.every(c => selecionados.has(c));
    setSelecionados(prev => {
      const next = new Set(prev);
      todosVisiveis.forEach(c => todosSelecionados ? next.delete(c) : next.add(c));
      return next;
    });
  }

  function salvar() {
    try { localStorage.setItem("meus_codigos", JSON.stringify([...selecionados])); } catch {}
    onSave(selecionados);
    if (onSaveAlerta) onSaveAlerta(alertaLocal);
    onClose();
  }

  const todosVisivelSelecionados = filtrados.length > 0 &&
    filtrados.every(p => selecionados.has(p.cod));

  const CORES_LINHA = {
    "Dinâmica": "#1B7FE8", "Foco": "#F59E0B", "Sinergia": "#10B981",
    "Triunfo": "#8B5CF6", "Sintonia": "#EC4899", "Agilidade": "#06B6D4",
    "Sem linha": "#94A3B8",
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:1000,
      background:"rgba(10,15,30,0.7)", display:"flex",
      alignItems:"center", justifyContent:"center", padding:20 }}
      onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>

      <div style={{ background:T.surface, borderRadius:20, width:"100%", maxWidth:620,
        maxHeight:"90vh", display:"flex", flexDirection:"column",
        boxShadow:"0 24px 80px rgba(10,15,30,0.35)", overflow:"hidden" }}>

        {/* Header */}
        <div style={{ padding:"20px 24px", background:"linear-gradient(135deg, #1B7FE8, #0D1F5C)",
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <div style={{ width:38, height:38, borderRadius:10, background:"rgba(255,255,255,0.15)",
              display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none"
                stroke="#fff" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
              </svg>
            </div>
            <div>
              <div style={{ fontWeight:800, fontSize:16, color:"#fff" }}>Minha grade</div>
              <div style={{ fontSize:12, color:"rgba(255,255,255,0.75)" }}>
                {selecionados.size} de {todosProdutos.length} produtos selecionados
              </div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.15)", border:"none",
            cursor:"pointer", color:"#fff", width:32, height:32, borderRadius:8,
            fontSize:16, display:"flex", alignItems:"center", justifyContent:"center",
            fontWeight:700 }}>×</button>
        </div>

        {/* Tabs: Minha grade / Configurar alerta */}
        <div style={{ display:"flex", borderBottom:`1px solid ${T.borderL}`, background:T.surface }}>
          {[
            { id:"grade", label:"Minha grade" },
            { id:"alerta", label:"⚠ Configurar alerta" },
          ].map(t => (
            <button key={t.id} onClick={() => setAba(t.id)}
              style={{ flex:1, padding:"11px 8px", fontSize:12, fontWeight:700, cursor:"pointer",
                border:"none", borderBottom:`3px solid ${aba===t.id?"#1B7FE8":"transparent"}`,
                background:"transparent", color:aba===t.id?"#1B7FE8":T.sub,
                transition:"all 0.15s" }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ─── ABA: MINHA GRADE ─── */}
        {aba === "grade" && (<>

        {/* Linhas de produto — cards com ação clara */}
        <div style={{ padding:"16px 24px", borderBottom:`1px solid ${T.borderL}`, background:"#FAFBFF" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
            <span style={{ fontSize:11, fontWeight:700, color:T.sub, letterSpacing:0.6, textTransform:"uppercase" }}>
              Linhas de produto
            </span>
            <button
              onClick={() => setModoAtribuir(m => m ? null : LINHAS_PRODUTO[0])}
              style={{ fontSize:11, fontWeight:600, color: modoAtribuir ? "#1B7FE8" : T.hint,
                background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              {modoAtribuir ? "Sair do modo edição" : "Editar associações"}
            </button>
          </div>

          {/* Modo de atribuição: seletor da linha de destino */}
          {modoAtribuir && (

              <span style={{ fontSize:11, color:"#1B7FE8", fontWeight:600, alignSelf:"center", marginRight:4 }}>

          )}

          {!modoAtribuir && (
            <>

                  Linha
                </span>
                <span style={{ fontSize:10, color:T.hint, fontWeight:600, textTransform:"uppercase", letterSpacing:0.4 }}>
                  Ver lista
                </span>
              </div>

              {/* Cards de linha: checkbox (grade) + nome clicável (filtro de visualização) */}
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                {[...LINHAS_PRODUTO, "Sem linha"].map(linha => {
                  const codigos = contagemPorLinha[linha] || [];
                  const count = codigos.length;
                  const cor = CORES_LINHA[linha] || "#94A3B8";
                  const marcados = codigos.filter(c => selecionados.has(c)).length;
                  const estado = count===0 ? "vazio" : marcados===0 ? "nenhum" : marcados===count ? "todos" : "parcial";

                  return (
                    <div key={linha} style={{ display:"flex", alignItems:"center", gap:8,

                      background: filtroAtivo ? cor+"12" : T.surface,
                      border:`1px solid ${filtroAtivo ? cor : T.borderL}`,
                      opacity: count===0 ? 0.45 : 1, transition:"all 0.15s" }}>

                      {/* Checkbox de inclusão na grade (toggle por linha) */}
                      <button
                        onClick={() => toggleLinhaNaGrade(linha)}
                        disabled={count === 0}
                        title={
                          estado === "todos" ? `Remover todos os produtos de "${linha}" da grade` :
                          `Adicionar todos os produtos de "${linha}" à grade`
                        }
                        style={{ width:20, height:20, borderRadius:6, flexShrink:0,
                          border:`2px solid ${estado==="vazio"?T.borderL:cor}`,
                          background: estado==="todos" ? cor : estado==="parcial" ? cor+"35" : "transparent",
                          cursor: count===0 ? "default" : "pointer",
                          display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {estado === "todos" && (
                          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                            <polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2.2"
                              strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        )}
                        {estado === "parcial" && (
                          <div style={{ width:8, height:2, background:cor, borderRadius:1 }}/>
                        )}
                      </button>

                      {/* Nome + contagem — clicável para filtrar visualização */}
                      <button
                        onClick={() => count > 0 && filtrarPorLinha(linha)}
                        disabled={count === 0}
                        style={{ flex:1, display:"flex", alignItems:"center", gap:7,
                          background:"none", border:"none", textAlign:"left",
                          cursor: podeClicar ? "pointer" : "default", padding:0 }}>
                        <span style={{ width:7, height:7, borderRadius:"50%", background:cor, flexShrink:0 }}/>
                        <span style={{ fontSize:13, fontWeight:600, color:T.text }}>{linha}</span>
                        <span style={{ fontSize:11, color:T.hint }}>
                          {marcados>0 ? `${marcados}/${count}` : count}
                        </span>
                      </button>

                      {/* Indicador de filtro de visualização ativo */}
                      {podeClicar && (
                        <div style={{ width:28, height:28, borderRadius:8, flexShrink:0,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          background: filtroAtivo ? cor : "#F1F5F9",
                          cursor:"pointer" }}
                          onClick={() => filtrarPorLinha(linha)}
                          title={filtroAtivo ? "Parar de filtrar a lista por esta linha" : "Filtrar a lista abaixo só com esta linha"}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                            stroke={filtroAtivo ? "#fff" : T.hint} strokeWidth={2.2}
                            strokeLinecap="round" strokeLinejoin="round">
                            <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
                          </svg>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Ação em massa: todas as linhas de uma vez */}
              {(() => {
                const todosComLinha = todosProdutos.filter(p => linhasMap[p.cod]).map(p => p.cod);
                const todasMarcadas = todosComLinha.length > 0 &&
                  todosComLinha.every(cod => selecionados.has(cod));
                return (
                  <button onClick={marcarTodasLinhas}
                    style={{ width:"100%", marginTop:10, padding:"9px", fontSize:12, fontWeight:700,
                      cursor:"pointer", border:`1.5px solid ${todasMarcadas?"#DC2626":"#0D1F5C"}`,
                      borderRadius:10, background: todasMarcadas ? "#FEE2E2" : "#0D1F5C",
                      color: todasMarcadas ? "#991B1B" : "#fff",
                      display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                      strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                      {todasMarcadas
                        ? <path d="M18 6L6 18M6 6l12 12"/>
                        : <polyline points="20 6 9 17 4 12"/>}
                    </svg>
                    {todasMarcadas ? "Desmarcar todas as linhas da grade" : "Marcar todas as linhas na grade"}
                  </button>
                );
              })()}
            </>
          )}

          <div style={{ fontSize:11, color:T.hint, marginTop:10 }}>
            {modoAtribuir
              ? "Clique nos produtos da lista abaixo para atribuí-los à linha selecionada."
              : "Marque o ☑ para incluir/excluir a linha da sua grade · clique na 🔍 para apenas visualizar a lista filtrada."}
          </div>
        </div>


        {/* Busca + ações */}
        <div style={{ padding:"14px 24px", borderBottom:`1px solid ${T.borderL}`,
          display:"flex", gap:10, alignItems:"center" }}>
          <div style={{ flex:1, position:"relative" }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke={T.hint} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
              style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}>
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input value={busca} onChange={e=>setBusca(e.target.value)}

              style={{ width:"100%", padding:"8px 10px 8px 32px", fontSize:13,
                border:`1.5px solid ${T.borderL}`, borderRadius:10, outline:"none",
                color:T.text, background:T.snow, boxSizing:"border-box" }}/>
          </div>
          {linhaFiltro && (
            <button onClick={()=>setLinhaFiltro(null)}
              style={{ padding:"8px 12px", fontSize:12, fontWeight:600, cursor:"pointer",
                border:"none", borderRadius:10, background:"#FEE2E2", color:"#991B1B",
                whiteSpace:"nowrap" }}>
              Limpar filtro
            </button>
          )}
          {!modoAtribuir && (
            <button onClick={toggleAll}
              style={{ padding:"8px 12px", fontSize:12, fontWeight:600, cursor:"pointer",
                border:`1.5px solid ${T.borderL}`, borderRadius:10, background:T.surface,
                color:T.sub, whiteSpace:"nowrap", transition:"all 0.15s" }}>
              {todosVisivelSelecionados ? "Desmarcar visíveis" : "Marcar visíveis"}
            </button>
          )}
        </div>

        {/* Lista de produtos */}
        <div style={{ flex:1, overflowY:"auto", padding:"8px 0" }}>
          {filtrados.length === 0 && (
            <div style={{ padding:"40px", textAlign:"center", color:T.hint, fontSize:13 }}>
              Nenhum produto encontrado.
            </div>
          )}
          {filtrados.map((p, i) => {
            const on = modoAtribuir
              ? linhasMap[p.cod] === modoAtribuir
              : selecionados.has(p.cod);
            const corLinha = linhasMap[p.cod] ? CORES_LINHA[linhasMap[p.cod]] : null;
            return (
              <div key={p.cod} onClick={()=>toggle(p.cod)}
                style={{ display:"flex", alignItems:"center", gap:14, padding:"10px 24px",
                  cursor:"pointer", transition:"background 0.1s",
                  background:on?(modoAtribuir?"#EAF2FF":"#F0FDF9"):T.surface,
                  borderBottom:i<filtrados.length-1?`1px solid ${T.borderL}`:"none" }}
                onMouseEnter={e=>{ e.currentTarget.style.background=on?(modoAtribuir?"#DCE9FF":"#E6FBF5"):"#F8FAFF"; }}
                onMouseLeave={e=>{ e.currentTarget.style.background=on?(modoAtribuir?"#EAF2FF":"#F0FDF9"):T.surface; }}>

        </>)}

            <div style={{ padding:"14px 24px", background:"#FFFBEB",

              <span style={{ fontWeight:700 }}>⚠ Alerta pós-upload</span> — marque os produtos que devem

              {linhaAtiva && (
                <span style={{ display:"inline-flex", alignItems:"center", gap:4, marginLeft:8,

            <div style={{ padding:"12px 24px", borderBottom:`1px solid ${T.borderL}` }}>

          <span style={{ fontSize:12, color:T.sub }}>
            {aba === "grade"
              ? `${selecionados.size} produto${selecionados.size!==1?"s":""} na sua grade`

                <div style={{ display:"flex", alignItems:"center", gap:10 }}>

    </div>
  );

// ─── Animação de contagem (KPI counter) ──────────────────────────────────────
function useCounter(target, duration = 900) {
  const [val, setVal] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    if (target === prev.current) return;
    const start = prev.current;
    const diff  = target - start;
    const t0    = performance.now();
    function tick(now) {
      const p = Math.min((now - t0) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(start + diff * ease));
      if (p < 1) requestAnimationFrame(tick);
      else prev.current = target;
    }
    requestAnimationFrame(tick);
  }, [target, duration]);
  return val;
}

// ─── Mini sparkline SVG ───────────────────────────────────────────────────────
function Spark({ values, color = T.mint }) {
  const w=64, h=24, pad=2;
  const max = Math.max(...values, 1);
  const pts = values.map((v,i) => {
    const x = pad + (i/(values.length-1||1)) * (w-pad*2);
    const y = h - pad - (v/max)*(h-pad*2);
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={w} height={h} style={{ display:"block" }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2"
        strokeLinecap="round" strokeLinejoin="round"/>
      {values.map((v,i) => {
        const x = pad + (i/(values.length-1||1)) * (w-pad*2);
        const y = h - pad - (v/max)*(h-pad*2);
        return <circle key={i} cx={x} cy={y} r={i===values.length-1?3:0} fill={color}/>;
      })}
    </svg>
  );
}

      const wb = XLSX.read(e.target.result, { type:"binary" });
      onData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:"" }), file.name);

  }

  if (compact) {

          strokeLinecap="round" strokeLinejoin="round">

// ─── Dropdown de filial (dark, com busca + multi-check) ───────────────────────
function FilialDropdown({ filiais, selected, onChange, titulo="Filial" }) {
  const [open, setOpen] = useState(false);
  const [busca, setBusca] = useState("");
  const ref = useRef(null);

  useEffect(() => {
    function h(e) { if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const filtradas = busca.trim()
    ? filiais.filter(f=>f.toUpperCase().includes(busca.toUpperCase()))
    : filiais;

  function toggle(f) {
    onChange(selected.includes(f) ? selected.filter(x=>x!==f) : [...selected, f]);
  }
  function toggleAll() {
    const allOn = filtradas.every(f=>selected.includes(f));
    const rest = selected.filter(f=>!filtradas.includes(f));
    onChange(allOn ? rest : [...new Set([...selected, ...filtradas])]);
  }

  const btnLabel = selected.length===0
    ? `Todas as ${titulo.toLowerCase()}s`
    : selected.length===1 ? selected[0]
    : `${selected.length} ${titulo.toLowerCase()}s`;

  return (
    <div ref={ref} style={{ marginBottom:14 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
        <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", fontWeight:600,
          letterSpacing:0.8, textTransform:"uppercase" }}>{titulo}</div>
        {selected.length>0 && (
          <button onClick={()=>onChange([])}
            style={{ background:"none", border:"none", cursor:"pointer",
              fontSize:10, color:"rgba(255,255,255,0.3)", padding:0, fontWeight:600 }}>
            limpar
          </button>
        )}
      </div>

      {/* Trigger */}
      <button onClick={()=>setOpen(o=>!o)}
        style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"8px 10px", borderRadius:8, border:"none", cursor:"pointer", textAlign:"left",
          background: open||selected.length>0 ? "rgba(99,102,241,0.2)" : "rgba(255,255,255,0.06)",
          outline: open||selected.length>0 ? "1px solid rgba(99,102,241,0.5)" : "1px solid transparent",
          color: selected.length>0 ? "#A5B4FC" : "rgba(255,255,255,0.5)",
          fontSize:12, fontWeight:selected.length>0?600:400, transition:"all 0.15s" }}>
        <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
          flex:1, textAlign:"left" }}>{btnLabel}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth={2.5}
          style={{ transform:open?"rotate(180deg)":"rotate(0)", transition:"transform 0.2s", flexShrink:0, marginLeft:6 }}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      {/* Dropdown */}
      {open && (
        <div style={{ marginTop:4, background:"#0F1629", border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:10, overflow:"hidden", boxShadow:"0 8px 24px rgba(0,0,0,0.4)" }}>
          {/* Busca */}
          <div style={{ padding:"8px 10px", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
            <input value={busca} onChange={e=>setBusca(e.target.value)}
              placeholder="Buscar filial..."
              style={{ width:"100%", padding:"5px 8px", fontSize:11,
                background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:6, color:"rgba(255,255,255,0.8)", outline:"none",
                boxSizing:"border-box" }}/>
          </div>
          {/* Marcar todas visíveis */}
          {filtradas.length > 1 && (
            <button onClick={toggleAll}
              style={{ width:"100%", padding:"6px 10px", fontSize:11, fontWeight:600,
                background:"transparent", border:"none", cursor:"pointer", textAlign:"left",
                color:"rgba(255,255,255,0.35)", borderBottom:"1px solid rgba(255,255,255,0.06)",
                transition:"color 0.15s" }}
              onMouseEnter={e=>e.currentTarget.style.color="rgba(255,255,255,0.7)"}
              onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,0.35)"}>
              {filtradas.every(f=>selected.includes(f)) ? "Desmarcar todas" : "Marcar todas"}
            </button>
          )}
          {/* Lista */}
          <div style={{ maxHeight:200, overflowY:"auto" }}>
            {filtradas.map((f,i) => {
              const on = selected.includes(f);
              return (
                <div key={f} onClick={()=>toggle(f)}
                  style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 10px",
                    cursor:"pointer", fontSize:11, transition:"background 0.1s",
                    background:on?"rgba(99,102,241,0.15)":"transparent",
                    borderBottom:i<filtradas.length-1?"1px solid rgba(255,255,255,0.04)":"none" }}
                  onMouseEnter={e=>{ if(!on) e.currentTarget.style.background="rgba(255,255,255,0.05)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background=on?"rgba(99,102,241,0.15)":"transparent"; }}>
                  <div style={{ width:14, height:14, borderRadius:3, flexShrink:0,
                    background:on?"#818CF8":"transparent",
                    border:`1.5px solid ${on?"#818CF8":"rgba(255,255,255,0.2)"}`,
                    display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {on && <svg width="8" height="8" viewBox="0 0 12 12" fill="none">
                      <polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2.2"
                        strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>}
                  </div>
                  <span style={{ color:on?"#C7D2FE":"rgba(255,255,255,0.5)",
                    fontWeight:on?600:400, overflow:"hidden", textOverflow:"ellipsis",
                    whiteSpace:"nowrap", flex:1 }}>{f}</span>
                </div>
              );
            })}
            {filtradas.length===0 && (
              <div style={{ padding:"12px 10px", fontSize:11, color:"rgba(255,255,255,0.3)",
                textAlign:"center" }}>Nenhuma filial encontrada</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Bloco filial ─────────────────────────────────────────────────────────────
function FilialBlock({ filial, itens, situacaoFiltro, produtosSelecionados, onSituacaoChange, colLabels, isTop10, expandirSinal, expandirContador }) {
  const [aberto, setAberto] = useState(false);

  // Quando o sinal global mudar (expandir/recolher todos), sobrescreve o estado local
  useEffect(() => {
    if (expandirSinal === null || expandirSinal === undefined) return;
    setAberto(expandirSinal);
  }, [expandirSinal, expandirContador]);
  const [sortFilial, setSortFilial] = useState(null);
  const [sortDirFilial, setSortDirFilial] = useState("asc");
  const [top10Aberto, setTop10Aberto] = useState(false);

  // situacaoFiltro é um array vindo do estado global (sitF)
  const sitAtiva = Array.isArray(situacaoFiltro) ? situacaoFiltro : (situacaoFiltro ? [situacaoFiltro] : []);

  function toggleSit(e, sit) {
    e.stopPropagation();
    if (!aberto) setAberto(true);
    // Alterna no filtro global — aplica a todos os blocos
    const next = sitAtiva.includes(sit)
      ? sitAtiva.filter(s => s !== sit)
      : [...sitAtiva, sit];
    onSituacaoChange(next);
  }

  const base = useMemo(() => {
    let r = sitAtiva.length > 0 ? itens.filter(i => sitAtiva.includes(i.situacao)) : itens;
    if (produtosSelecionados.length > 0) r = r.filter(i => produtosSelecionados.includes(i.produto));
    return r;
  }, [itens, situacaoFiltro, produtosSelecionados]);

  const cF = itens.filter(r=>r.situacao==="Falta").length;
  const cE = itens.filter(r=>r.situacao==="Excesso").length;
  const cR = itens.filter(r=>r.situacao==="Regular").length;
  const totalVendas = base.reduce((a,r)=>a+r.vendasJun,0);
  if (base.length===0 && sitAtiva.length===0) return null;
  if (base.length===0) return null;

  // Ordenação local da tabela
  const sortedBase = useMemo(() => {
    if (!sortFilial) return base;
    return [...base].sort((a,b) => {
      let va = a[sortFilial], vb = b[sortFilial];
      if (sortFilial === "codProduto") { va = Number(va); vb = Number(vb); }
      if (typeof va === "string") return sortDirFilial==="asc" ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortDirFilial==="asc" ? va-vb : vb-va;
    });
  }, [base, sortFilial, sortDirFilial]);

  // Top 10 produtos mais vendidos nesta filial (coluna P — mês anterior fechado)
  const top10 = useMemo(() => {
    return [...base]
      .sort((a,b) => b.vendasMai - a.vendasMai)
      .slice(0, 10);
  }, [base]);
  const maxVendaTop10 = Math.max(...top10.map(r => r.vendasMai), 1);

  function pill(sit, count, bg, color, dot) {
    if (count===0) return null;
    const on = sitAtiva.includes(sit);
    return (
      <span onClick={e=>toggleSit(e,sit)}
        style={{ display:"inline-flex", alignItems:"center", gap:5, fontSize:11, fontWeight:600,
          padding:"3px 10px", borderRadius:20, cursor:"pointer", userSelect:"none", transition:"all 0.15s",
          background:on?dot:bg, color:on?"#fff":color,
          border:`1.5px solid ${on?dot:"transparent"}` }}>
        <span style={{ width:6,height:6,borderRadius:"50%",background:on?"rgba(255,255,255,0.7)":dot,flexShrink:0 }}/>
        {count} {sit.toLowerCase()}{count!==1?"s":""}
      </span>
    );
  }

  return (
    <div style={{ border:`1px solid ${sitAtiva.length>0?"#818CF8":T.borderL}`, borderRadius:14,
      overflow:"hidden", marginBottom:10, transition:"border-color 0.2s",
      boxShadow:"0 1px 4px rgba(10,15,30,0.05)" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"12px 18px", background:T.snow,
          borderBottom:aberto?`1px solid ${T.borderL}`:"none" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div onClick={()=>setAberto(v=>!v)} title={aberto?"Recolher produtos":"Expandir produtos"}
            style={{ width:32, height:32, borderRadius:8, background:T.navy,
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
              cursor:"pointer", transition:"background 0.15s, transform 0.15s" }}
            onMouseEnter={e=>{ e.currentTarget.style.background="#1B7FE8"; e.currentTarget.style.transform="scale(1.06)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.background=T.navy; e.currentTarget.style.transform="scale(1)"; }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.mint}
              strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div>
            <div style={{ fontWeight:700, fontSize:13, color:T.text, display:"flex", alignItems:"center", gap:6 }}>
              {isTop10 && <span title="Top 10 em vendas" style={{ fontSize:14 }}>🏆</span>}
              {itens[0]?.codFilial && (
                <span style={{ color:T.hint, fontWeight:600 }}>{itens[0].codFilial}</span>
              )}
              {filial}
            </div>
            <div style={{ fontSize:11, color:T.sub }}>
              {base.length} produto{base.length!==1?"s":""}
              {sitAtiva.length>0 && (
                <span onClick={e=>{e.stopPropagation();onSituacaoChange([]);}}
                  style={{ color:"#6366F1", marginLeft:8, cursor:"pointer", fontWeight:600 }}>
                  ver todos
                </span>
              )}
            </div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {pill("Falta",   cF, "#FEE2E2", "#991B1B", "#EF4444")}
          {pill("Excesso", cE, "#FEF9C3", "#713F12", "#EAB308")}
          {pill("Regular", cR, "#D1FAE5", "#065F46", "#10B981")}
          <span style={{ fontSize:12, color:T.sub, marginLeft:4 }}>
            {totalVendas} vend.
          </span>
          <button onClick={e=>{ e.stopPropagation(); setTop10Aberto(v=>!v); if(!aberto) setAberto(true); }}
            style={{ display:"flex", alignItems:"center", gap:5, padding:"4px 10px",
              borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:700,
              background: top10Aberto ? "#1B7FE8" : "#EEF6FF",
              color: top10Aberto ? "#fff" : "#1B7FE8",
              transition:"all 0.15s" }}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/>
            </svg>
            Top 10
          </button>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.hint}
            strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
            style={{ transform:aberto?"rotate(180deg)":"rotate(0)", transition:"transform 0.2s" }}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      {/* Painel Top 10 produtos mais vendidos */}
      {top10Aberto && aberto && (
        <div style={{ padding:"16px 18px", background:"#F8FAFF",
          borderBottom:`1px solid ${T.borderL}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
            <div style={{ width:22, height:22, borderRadius:6, background:"#1B7FE8",
              display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                stroke="#fff" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/>
              </svg>
            </div>
            <span style={{ fontSize:12, fontWeight:700, color:"#0D1F5C",
              letterSpacing:0.4, textTransform:"uppercase" }}>
              Top 10 mais vendidos · {colLabels.vendasMai}
            </span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {top10.map((r, i) => (
              <div key={r.codProduto+i} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ width:18, fontSize:11, fontWeight:800,
                  color: i<3 ? "#1B7FE8" : T.hint, flexShrink:0, textAlign:"right" }}>
                  {i+1}
                </span>
                <span style={{ fontSize:12, fontWeight:600, color:T.text, width:200,
                  flexShrink:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}
                  title={r.produto}>
                  {r.produto}
                </span>
                <div style={{ flex:1, height:16, background:"#E2E8F4", borderRadius:8,
                  overflow:"hidden", position:"relative" }}>
                  <div style={{ height:"100%",
                    width:`${(r.vendasMai/maxVendaTop10)*100}%`,
                    background: i<3 ? "#1B7FE8" : "#94B8E8",
                    borderRadius:8, transition:"width 0.3s" }}/>
                </div>
                <span style={{ fontSize:12, fontWeight:800, color:"#0D1F5C", width:32,
                  flexShrink:0, textAlign:"right" }}>
                  {r.vendasMai}
                </span>
              </div>
            ))}
            {top10.length === 0 && (
              <div style={{ fontSize:12, color:T.hint, textAlign:"center", padding:"12px 0" }}>
                Nenhum produto com vendas registradas.
              </div>
            )}
          </div>
        </div>
      )}
      {aberto && (
        <div>
          {/* Barra de resumo dentro da área expandida */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"10px 18px", background:"#FAFBFF", borderBottom:`1px solid ${T.borderL}` }}>
            <span style={{ fontSize:12, color:T.sub, fontWeight:600 }}>
              Total: {totalVendas} unidades vendidas
            </span>
            <button onClick={()=>setTop10Aberto(v=>!v)}
              style={{ display:"flex", alignItems:"center", gap:5, padding:"4px 10px",
                borderRadius:20, border:"none", cursor:"pointer", fontSize:11, fontWeight:700,
                background: top10Aberto ? "#1B7FE8" : "#EEF6FF",
                color: top10Aberto ? "#fff" : "#1B7FE8",
                transition:"all 0.15s" }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/>
              </svg>
              Top 10
            </button>
          </div>

        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ background:"#FAFBFF" }}>
                {[
                  { h:"Código",              key:"codProduto", num:true  },
                  { h:"Produto",             key:"produto",    num:false },
                  { h:"Estoque",             key:"estoque",    num:true  },
                  { h:"Situação",            key:"situacao",   num:false },
                  { h:colLabels.vendasJun,   key:"vendasJun",  num:true  },
                  { h:colLabels.vendasMai,   key:"vendasMai",  num:true  },
                  { h:"Média Trim.",         key:"mediaTrim",  num:true  },
                  { h:"Preço",               key:"preco",      num:true  },
                ].map(({ h, key }) => {
                  const active = sortFilial === key;
                  return (
                    <th key={key} onClick={() => {
                      if (sortFilial === key) setSortDirFilial(d => d==="asc"?"desc":"asc");
                      else { setSortFilial(key); setSortDirFilial("asc"); }
                    }}
                      style={{ padding:"8px 14px", textAlign:"left", fontWeight:700,
                        fontSize:10, color:active?"#4DAAFF":T.sub,
                        borderBottom:`1px solid ${T.borderL}`,
                        whiteSpace:"nowrap", letterSpacing:0.4, textTransform:"uppercase",
                        cursor:"pointer", userSelect:"none",
                        background:active?"rgba(77,170,255,0.07)":"#FAFBFF",
                        transition:"background 0.1s, color 0.1s" }}>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
                        {h}
                        <span style={{ fontSize:9, opacity:active?1:0.3 }}>
                          {active?(sortDirFilial==="asc"?"▲":"▼"):"⇅"}
                        </span>
                      </span>
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {sortedBase.map((r,i)=>(
                <tr key={i} style={{ borderBottom:`1px solid ${T.borderL}` }}
                  onMouseEnter={e=>e.currentTarget.style.background="#F8FAFF"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"9px 14px", color:T.sub, whiteSpace:"nowrap",
                    fontSize:13, fontWeight:600 }}>{r.codProduto}</td>
                  <td style={{ padding:"9px 14px", fontWeight:600, maxWidth:200,
                    overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }} title={r.produto}>{r.produto}</td>
                  <td style={{ padding:"9px 14px", textAlign:"center", fontWeight:800,
                    color:r.estoque===0?T.coral:T.text }}>{r.estoque}</td>
                  <td style={{ padding:"9px 14px" }}><Badge sit={r.situacao}/></td>
                  <td style={{ padding:"9px 14px", textAlign:"center", color:T.sub }}>{r.vendasJun}</td>
                  <td style={{ padding:"9px 14px", textAlign:"center", color:T.sub }}>{r.vendasMai}</td>
                  <td style={{ padding:"9px 14px", textAlign:"center", color:T.sub }}>{r.mediaTrim}</td>
                  <td style={{ padding:"9px 14px", whiteSpace:"nowrap", fontWeight:600 }}>
                    {r.preco.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        </div>
      )}
    </div>
  );
}

// ─── Filtro multi-seleção para sidebar dark ───────────────────────────────────
function MultiCheckFilter({ label, options, selected, onChange, colorMap }) {
  function toggle(val) {
    onChange(selected.includes(val) ? selected.filter(v=>v!==val) : [...selected, val]);
  }
  return (
    <div style={{ marginBottom:14 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        marginBottom:6 }}>
        <div style={{ fontSize:10, color:"rgba(255,255,255,0.3)", fontWeight:600,
          letterSpacing:0.8, textTransform:"uppercase" }}>{label}</div>
        {selected.length > 0 && (
          <button onClick={()=>onChange([])}
            style={{ background:"none", border:"none", cursor:"pointer",
              fontSize:10, color:"rgba(255,255,255,0.3)", padding:0,
              fontWeight:600, letterSpacing:0.5 }}>
            limpar
          </button>
        )}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
        {options.map(opt => {
          const on = selected.includes(opt.value);
          const dot = colorMap?.[opt.value];
          return (
            <button key={opt.value} onClick={()=>toggle(opt.value)}
              style={{ display:"flex", alignItems:"center", gap:9, width:"100%",
                padding:"7px 10px", borderRadius:8, border:"none", cursor:"pointer",
                textAlign:"left", transition:"all 0.15s",
                background: on ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.03)",
                outline: on ? "1px solid rgba(255,255,255,0.15)" : "1px solid transparent",
              }}>
              {/* Checkbox */}
              <div style={{ width:15, height:15, borderRadius:4, flexShrink:0,
                background: on ? (dot||T.mint) : "transparent",
                border: `1.5px solid ${on ? (dot||T.mint) : "rgba(255,255,255,0.2)"}`,
                display:"flex", alignItems:"center", justifyContent:"center",
                transition:"all 0.15s" }}>
                {on && <svg width="9" height="9" viewBox="0 0 12 12" fill="none">
                  <polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2.2"
                    strokeLinecap="round" strokeLinejoin="round"/>
                </svg>}
              </div>
              {/* Dot indicador de cor */}
              {dot && <span style={{ width:7, height:7, borderRadius:"50%",
                background:dot, flexShrink:0, opacity:on?1:0.4 }}/>}
              <span style={{ fontSize:12, color: on ? "#fff" : "rgba(255,255,255,0.5)",
                fontWeight: on ? 600 : 400, flex:1, overflow:"hidden",
                textOverflow:"ellipsis", whiteSpace:"nowrap", transition:"color 0.15s" }}>
                {opt.label}
              </span>
              {on && <span style={{ fontSize:10, color:dot||T.mint, fontWeight:700 }}>✓</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── Aba Maps — mapa estilizado com pinos por cidade ──────────────────────────
// ─── Cache de geocoding no localStorage ───────────────────────────────────────
function getGeoCache() {
  try { return JSON.parse(localStorage.getItem("geo_cache") || "{}"); }
  catch { return {}; }
}
function saveGeoCache(cache) {
  try { localStorage.setItem("geo_cache", JSON.stringify(cache)); } catch {}
}

function MapsTab({ rows, meusCodigos, meus }) {
  const [coordsMap, setCoordsMap] = useState({});
  const cacheRef = useRef(getGeoCache());
  const mapDivRef = useRef(null);
  const leafletMapRef = useRef(null);
  const [leafletReady, setLeafletReady] = useState(!!window.L);

  useEffect(() => {
    if (window.L) { setLeafletReady(true); return; }
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    document.head.appendChild(link);
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
    script.onload = () => setLeafletReady(true);
    document.head.appendChild(script);
    return () => {
      if (leafletMapRef.current) {
        try { leafletMapRef.current.remove(); } catch {}
        leafletMapRef.current = null;
      }
    };
  }, []);

  // Cidades únicas com total de lojas
  const cidades = useMemo(() => {
    const map = new Map();
    rows.forEach(r => {
      if (!r.cidade) return;
      const key = r.cidade.toUpperCase();
      if (!map.has(key)) map.set(key, { cidade: r.cidade, uf: r.uf || "", filiais: new Set() });
      map.get(key).filiais.add(r.filial);
    });
    return [...map.values()]
      .map(v => ({
        cidade: v.cidade,
        uf: v.uf,
        totalLojas: v.filiais.size,
        key: v.cidade.toUpperCase(),
        coord: CIDADE_COORDS[v.cidade.toUpperCase()] || null,
      }))
      .sort((a, b) => b.totalLojas - a.totalLojas);
  }, [rows]);

  // Para cidades não mapeadas, busca via Nominatim
  useEffect(() => {
    let cancelled = false;
    const semCoord = cidades.filter(c => !c.coord && !cacheRef.current[c.key]);

    async function geocodeCidade(item) {
      if (cacheRef.current[item.key]) return cacheRef.current[item.key];
      try {
        const q = encodeURIComponent(`${item.cidade}, ${item.uf}, Brasil`);
        const resp = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=br`,
          { headers: { "Accept-Language": "pt-BR" } }
        );
        const data = await resp.json();
        if (data && data[0]) {
          const coord = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          cacheRef.current[item.key] = coord;
          saveGeoCache(cacheRef.current);
          return coord;
        }
      } catch {}
      return null;
    }

    async function processar() {
      for (const item of semCoord) {
        if (cancelled) return;
        setCoordsMap(prev => ({ ...prev, [item.key]: "loading" }));
        const coord = await geocodeCidade(item);
        if (cancelled) return;
        setCoordsMap(prev => ({ ...prev, [item.key]: coord || "error" }));
        await new Promise(r => setTimeout(r, 1100));
      }
    }
    if (semCoord.length > 0) processar();
    return () => { cancelled = true; };
  }, [cidades]);

  // Resolve coordenadas: fixa > cache > geocoding
  const dadosComCoord = useMemo(() => cidades.map(c => {
    const coord = c.coord || (coordsMap[c.key] && coordsMap[c.key] !== "loading" && coordsMap[c.key] !== "error"
      ? coordsMap[c.key] : null);
    return { ...c, coord, carregando: !c.coord && coordsMap[c.key] === "loading" };
  }), [cidades, coordsMap]);

  const comCoord = dadosComCoord.filter(d => d.coord);
  const maxLojas = Math.max(...dadosComCoord.map(d => d.totalLojas), 1);

  // Renderiza pinos no Leaflet
  useEffect(() => {
    if (!leafletReady || !mapDivRef.current || comCoord.length === 0) return;
    const L = window.L;

    if (!leafletMapRef.current) {
      leafletMapRef.current = L.map(mapDivRef.current, { zoomControl: true, scrollWheelZoom: true });
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap", maxZoom: 18,
      }).addTo(leafletMapRef.current);
      leafletMapRef.current._markersLayer = L.layerGroup().addTo(leafletMapRef.current);
    }

    const map = leafletMapRef.current;
    map._markersLayer.clearLayers();
    const bounds = [];

    comCoord.forEach(({ cidade, uf, totalLojas, coord }) => {
      bounds.push([coord.lat, coord.lng]);
      const size = 30 + (totalLojas / maxLojas) * 20;
      const icon = L.divIcon({
        className: "",
        html: `
          <div style="display:flex;flex-direction:column;align-items:center;transform:translateY(-100%);">
            <div style="background:#fff;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;
              color:#0D1F5C;margin-bottom:4px;box-shadow:0 2px 8px rgba(10,15,30,0.2);
              white-space:nowrap;font-family:'Inter','Segoe UI',sans-serif;">
              ${cidade} · ${totalLojas} loja${totalLojas !== 1 ? "s" : ""}
            </div>
            <svg width="${size}" height="${size * 1.3}" viewBox="0 0 24 32"
              style="filter:drop-shadow(0 3px 6px rgba(13,31,92,0.4));">
              <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 20 12 20s12-11 12-20C24 5.4 18.6 0 12 0z" fill="#1B7FE8"/>
              <circle cx="12" cy="12" r="5" fill="#fff"/>
              <circle cx="12" cy="12" r="2.8" fill="#0D1F5C"/>
            </svg>
          </div>`,
        iconSize: [size, size * 1.3],
        iconAnchor: [size / 2, size * 1.3],
      });
      L.marker([coord.lat, coord.lng], { icon }).addTo(map._markersLayer);
    });

    if (bounds.length === 1) map.setView(bounds[0], 12);
    else if (bounds.length > 1) map.fitBounds(bounds, { padding: [60, 60] });
    setTimeout(() => map.invalidateSize(), 100);
  }, [leafletReady, comCoord, maxLojas]);

  return (
    <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
      {/* Mapa */}
      <div style={{ flex:"2 1 480px", minWidth:320, borderRadius:16,
        border:`1px solid ${T.borderL}`, height:460, overflow:"hidden",
        boxShadow:"0 2px 12px rgba(10,15,30,0.06)", background:"#EAF2FF" }}>
        <style>{"@keyframes spin{to{transform:rotate(360deg)}} .leaflet-control-attribution{font-size:9px!important}"}</style>
        <div ref={mapDivRef} style={{ width:"100%", height:"100%",
          display: comCoord.length > 0 ? "block" : "none" }}/>
        {comCoord.length === 0 && (
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center",
            justifyContent:"center", height:"100%", gap:10, color:"#64748B", fontSize:13 }}>
            <div style={{ width:24, height:24, border:"3px solid #CBD5E8",
              borderTopColor:"#1B7FE8", borderRadius:"50%",
              animation:"spin 0.8s linear infinite" }}/>
            Carregando mapa...
          </div>
        )}
      </div>

      {/* Lista lateral */}
      <div style={{ flex:"1 1 240px", minWidth:220 }}>
        <div style={{ background:T.surface, border:`1px solid ${T.borderL}`, borderRadius:16,
          overflow:"hidden", boxShadow:"0 2px 12px rgba(10,15,30,0.06)" }}>
          <div style={{ padding:"14px 18px", borderBottom:`1px solid ${T.borderL}`,
            fontSize:11, fontWeight:700, color:T.sub, textTransform:"uppercase", letterSpacing:0.6 }}>
            {dadosComCoord.length} cidade{dadosComCoord.length !== 1 ? "s" : ""} atendida{dadosComCoord.length !== 1 ? "s" : ""}
          </div>
          {dadosComCoord.map(({ cidade, uf, totalLojas, coord, carregando }, i) => (
            <div key={cidade} style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"12px 18px", borderBottom:i < dadosComCoord.length - 1 ? `1px solid ${T.borderL}` : "none" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {carregando
                  ? <div style={{ width:8, height:8, border:"1.5px solid #CBD5E8",
                      borderTopColor:"#1B7FE8", borderRadius:"50%",
                      animation:"spin 0.8s linear infinite", flexShrink:0 }}/>
                  : <div style={{ width:8, height:8, borderRadius:"50%",
                      background: coord ? "#1B7FE8" : "#CBD5E8", flexShrink:0 }}/>
                }
                <span style={{ fontSize:13, fontWeight:600, color:T.text }}>
                  {cidade}{uf && <span style={{ color:T.hint, fontWeight:400 }}> · {uf}</span>}
                </span>
              </div>
              <span style={{ fontSize:13, fontWeight:800, color:"#1B7FE8" }}>{totalLojas}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop:12, background:"#0D1F5C", borderRadius:16, padding:"16px 18px",
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:12, color:"rgba(255,255,255,0.6)", fontWeight:600 }}>Total de lojas</span>
          <span style={{ fontSize:22, fontWeight:800, color:"#fff" }}>
            {dadosComCoord.reduce((a, d) => a + d.totalLojas, 0)}
          </span>
        </div>
      </div>
    </div>
  );
}

    const nomeColT = colsKeys[19] || "";
    const nomeColU = colsKeys[20] || "";

    // Atualiza os labels exibidos nas colunas — usa o nome real da planilha
    setColLabels({
      vendasJun:   nomeColO,
      vendasMai:   nomeColP,
      vendasJun25: nomeColQ,
    });

    const mapped = json.map(r => ({
      // Campos de identificação da filial
      codFilial:   r["Cod. Filial"]??"",
      filial:      String(r["Filial"]||""),
      endereco:    String(r["Endereço"]||r["Endereco"]||""),
      numero:      r["Número"]??r["Numero"]??"",
      bairro:      String(r["Bairro"]||""),
      cep:         String(r["CEP"]||""),
      cidade:      String(r["Cidade"]||""),
      uf:          String(r["UF"]||""),
      // Campos do produto
      codProduto:  r["Cod. Produto"]??"",
      produto:     String(r["Produto"]||""),
      linha:       String(r["Linha"]||""),
      preco:       Number(r["Preço"]||r["Preco"]||0),
      estoque:     Number(r["Estoque"]||0),
      situacao:    String(r["Situação Estoque"]||r["Situacao Estoque"]||""),
      // Campos de vendas — lidos pelo nome real da coluna (dinâmico por posição)
      vendasJun:   Number(r[nomeColO]||0),
      vendasMai:   Number(r[nomeColP]||0),
      vendasJun25: Number(r[nomeColQ]||0),
      mediaTrim:   Number(r["Venda média Trim. fechado"]||0),
      // Percentuais — também dinâmicos
      pctMai:      Number(r[nomeColS]||0),
      pctJun25:    Number(r[nomeColT]||0),
      pctTrim:     Number(r[nomeColU]||0),
    }));
    setRows(mapped);
    setFileName(name||"");
    setProdSel([]); setFilialF([]); setSitF([]); setCidadeF([]); setProdAberto(null);
    setLinhaAtiva(null);

    // Calcula estoque total dos produtos configurados no alerta
    const alertaSet = loadAlertaCodigos();
    const map = new Map();
    mapped.forEach(r => {
      const cod = Number(r.codProduto);
      if (!alertaSet.has(cod)) return;
      if (!map.has(cod)) map.set(cod, { codProduto: cod, produto: r.produto, estoque: 0 });
      map.get(cod).estoque += r.estoque;
    });
    const lista = [...alertaSet].map(cod => map.get(cod) || { codProduto: cod, produto: "(não encontrado na planilha)", estoque: 0 });
    setInvernoDados(lista);

    // Abre primeiro o popup de seleção de linha; o de inverno aparece ao fechá-lo
    setLinhaSelecaoAberta(true);
  }, []);

  function handleFileInput(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, { type:"binary" });
      handleData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:"" }), file.name);
    };
    reader.readAsBinaryString(file);
  }

  const filiais = useMemo(() =>

  const cidades = useMemo(() =>

  const allProducts = useMemo(() => {
    const base = rows.filter(r => meusCodigos.has(Number(r.codProduto)) &&
      (!linhaAtiva || linhasMap[Number(r.codProduto)] === linhaAtiva));

  }, [rows, meusCodigos, linhaAtiva, linhasMap]);

  // Agrupado por produto — agrupa PRIMEIRO, filtra situação DEPOIS do total
  const porProduto = useMemo(() => {
    // 1. Filtra apenas por "meus produtos" e seleção de produto (não por situação ainda)
    const base = rows.filter(r => {
      if (!meusCodigos.has(Number(r.codProduto))) return false;
      if (linhaAtiva && linhasMap[Number(r.codProduto)] !== linhaAtiva) return false;
      if (prodSel.length>0 && !prodSel.includes(r.produto)) return false;
      if (cidadeF.length>0 && !cidadeF.includes(r.cidade)) return false;
      return true;
    });

    // 2. Agrupa e soma todas as filiais
    const map = new Map();
    base.forEach(r => {
      if (!map.has(r.produto)) map.set(r.produto, { codProduto:r.codProduto,
        produto:r.produto, linha:r.linha, preco:r.preco,
        estoque:0, vendasJun:0, vendasMai:0, vendasJun25:0, mediaTrim:0 });
      const g = map.get(r.produto);
      g.estoque    += r.estoque;
      g.vendasJun  += r.vendasJun;
      g.vendasMai  += r.vendasMai;
      g.vendasJun25+= r.vendasJun25;
      g.mediaTrim  += r.mediaTrim;
    });

    // 3. Calcula situação consolidada sobre o estoque TOTAL
    const SO = { Falta:0, Excesso:1, Regular:2 };
    let items = [...map.values()].map(g => ({
      ...g,
      situacaoConsolidada: g.estoque < 20 ? "Falta" : g.estoque <= 100 ? "Regular" : "Excesso",
    }));

    // 4. Agora sim filtra por situação (sobre o total consolidado)
    if (sitF.length > 0) {
      items = items.filter(g => sitF.includes(g.situacaoConsolidada));
    }

    // 5. Ordena
    items.sort((a,b) => {
      let va,vb;
      if (sortCol==="codProduto") { va=Number(a.codProduto); vb=Number(b.codProduto); }
      else if (sortCol==="produto")  return sortDir==="asc"?a.produto.localeCompare(b.produto):b.produto.localeCompare(a.produto);
      else if (sortCol==="linha")    return sortDir==="asc"?a.linha.localeCompare(b.linha):b.linha.localeCompare(a.linha);
      else if (sortCol==="situacao") { va=SO[a.situacaoConsolidada]??9; vb=SO[b.situacaoConsolidada]??9; }
      else { const k=sortCol; va=a[k]??0; vb=b[k]??0; }
      return sortDir==="asc"?va-vb:vb-va;
    });

    return items;
  }, [rows, meusCodigos, linhaAtiva, linhasMap, prodSel, sitF, cidadeF, sortCol, sortDir]);

  const porFilial = useMemo(() => {
    const base = rows.filter(r => {
      if (!meusCodigos.has(Number(r.codProduto))) return false;
      if (linhaAtiva && linhasMap[Number(r.codProduto)] !== linhaAtiva) return false;
      if (cidadeF.length>0 && !cidadeF.includes(r.cidade)) return false;
      return true;
    });
    const map = new Map();
    base.forEach(r=>{ if(!map.has(r.filial)) map.set(r.filial,[]); map.get(r.filial).push(r); });
    return [...map.entries()]
      .filter(([nome]) => filialF.length===0 || filialF.includes(nome))
      .sort((a,b) => Number(a[1][0]?.codFilial) - Number(b[1][0]?.codFilial));
  }, [rows, meusCodigos, linhaAtiva, linhasMap, filialF, cidadeF]);

  // Top 10 filiais por soma da coluna P (vendasMai) — usado para exibir o troféu
  const top10FiliaisSet = useMemo(() => {

      (!linhaAtiva || linhasMap[Number(r.codProduto)] === linhaAtiva));
    const map = new Map();
    base.forEach(r => {
      map.set(r.filial, (map.get(r.filial) || 0) + r.vendasMai);
    });
    const ranking = [...map.entries()]
      .sort((a,b) => b[1] - a[1])
      .slice(0, 10)
      .map(([nome]) => nome);
    return new Set(ranking);
  }, [rows, meusCodigos, linhaAtiva, linhasMap]);

      faltas:    porProduto.filter(r=>r.situacaoConsolidada==="Falta").length,
      naoEncontrados,
    };
